name: Build & Release

# Spustí se po pushnutí tagu verze (např. v0.2.0), nebo ručně z Actions záložky.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # potřeba pro vytvoření / aktualizaci release a nahrání assetů

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifacts: release/*.dmg
          - os: windows-latest
            artifacts: release/*-setup.exe
          - os: ubuntu-latest
            artifacts: release/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `--publish never`: electron-builder se na CI s tagem jinak sám pokouší
      # publikovat na GitHub (a padá bez GH_TOKEN). Publikování řeší až release job.
      - name: Build & package (mac)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac -- --publish never
        env:
          # Bez code signingu (RC1 policy) – vypnout pokus o auto-podpis na CI.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build & package (win)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish never

      - name: Build & package (linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dumpio-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Release tvoříme jen pro tagy, ne pro ruční workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
